<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post a Job | Freelance Hub</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Quill CSS -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>
  <div class="container">

    <!-- Header -->
    <header class="app-header">
      <h1><i class="fa-solid fa-briefcase"></i> Freelance Hub Ethiopia</h1>
      <p>Post your next job in minutes.</p>
    </header>

    <!-- Progress Bar -->
    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>

    <!-- Form Section -->
    <section id="formSection">
      <form id="jobForm" class="form">

        <!-- Job Details -->
        <div class="card fade-in">
          <h3><i class="fa-solid fa-briefcase"></i> Job Details</h3>

          <label>Job Title*</label>
          <input type="text" name="job_title" placeholder="e.g., Frontend Developer" required>

          <label>Job Type*</label>
          <select name="job_type" required>
            <option value="">Select Type</option>
            <option>Full-time</option>
            <option>Part-time</option>
            <option>Contract</option>
            <option>Remote</option>
            <option>Volunteer</option>
            <option>Internship</option>
          </select>

          <label>Job Sector*</label>
          <select name="job_sector" required>
            <option value="">Select Sector</option>
            <option>IT & Software</option>
            <option>Design</option>
            <option>Marketing</option>
            <option>Finance</option>
            <option>Media</option>
            <option>Healthcare</option>
            <option>Education</option>
          </select>
        </div>

        <!-- Requirements -->
        <div class="card fade-in">
          <h3><i class="fa-solid fa-user-tie"></i> Requirements</h3>

          <label>Education*</label>
          <select name="education" required>
            <option value="">Select Education</option>
            <option>High School</option>
            <option>Certificate</option>
            <option>Bachelor's</option>
            <option>Master's</option>
            <option>PhD</option>
            <option>Not Required</option>
          </select>

          <label>Experience Level*</label>
          <select name="experience" required>
            <option value="">Select Experience</option>
            <option>Entry</option>
            <option>Mid</option>
            <option>Senior</option>
            <option>Expert</option>
          </select>

          <label>Gender Preference*</label>
          <select name="gender" required>
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Both</option>
          </select>

          <label>Skills (max 6)</label>
          <input type="text" name="skills" placeholder="e.g., React, SEO, Figma">
        </div>

        <!-- Compensation -->
        <div class="card fade-in">
          <h3><i class="fa-solid fa-money-bill-wave"></i> Compensation & Location</h3>

          <label>Salary*</label>
          <input type="number" name="salary" placeholder="Amount" required>

          <label>Currency*</label>
          <select name="currency" required>
            <option value="">Select</option>
            <option>ETB</option>
            <option>USD</option>
          </select>

          <label>Country*</label>
          <input type="text" name="country" placeholder="e.g., Ethiopia" required>

          <label>City*</label>
          <input type="text" name="city" placeholder="e.g., Addis Ababa" required>
        </div>

        <!-- Description -->
        <div class="card fade-in">
          <h3><i class="fa-solid fa-file-lines"></i> Job Description</h3>
          <div id="editor" style="height: 200px; background: #fff; border-radius: 10px;"></div>
          <input type="hidden" name="description" id="hiddenDescription">
        </div>

        <!-- Buttons -->
        <div class="form-actions fade-in">
          <button type="button" id="previewBtn" class="secondary-btn">
            <i class="fa-solid fa-eye"></i> Preview
          </button>
          <button type="submit" class="submit-btn">
            <i class="fa-solid fa-paper-plane"></i> Post Job
          </button>
        </div>
      </form>
    </section>

    <!-- Preview Section -->
    <section id="previewSection" style="display:none;">
      <h2><i class="fa-solid fa-eye"></i> Preview Job Post</h2>
      <div id="previewContent" class="card"></div>

      <div class="form-actions">
        <button id="editJob" class="secondary-btn">
          <i class="fa-solid fa-pen-to-square"></i> Edit
        </button>
        <button id="confirmSubmit" class="submit-btn">
          <i class="fa-solid fa-paper-plane"></i> Confirm & Post
        </button>
      </div>
    </section>
  </div>

  <!-- Quill JS -->
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <script src="script.js" defer></script>
</body>
</html>
